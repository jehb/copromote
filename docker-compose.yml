services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copromote-app
    restart: always
    ports:
      - "80:3000"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://${DB_USER:-copromote}:${DB_PASSWORD:-password}@mariadb:3306/${DB_NAME:-copromote_db}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - DISABLE_SECURE_COOKIES=${DISABLE_SECURE_COOKIES}
      - AI_PROVIDER=${AI_PROVIDER}
      - AI_MODEL=${AI_MODEL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_CHAT_INSTRUCTIONS=${AI_CHAT_INSTRUCTIONS}
      - EXTERNAL_DB_TYPE=${EXTERNAL_DB_TYPE}
      - EXTERNAL_DB_URL=${EXTERNAL_DB_URL}
      - EXTERNAL_DB_NAME=${EXTERNAL_DB_NAME}
      - EXTERNAL_DB_USER=${EXTERNAL_DB_USER}
      - EXTERNAL_DB_PASSWORD=${EXTERNAL_DB_PASSWORD}
      - WORDPRESS_URL=${WORDPRESS_URL}
      - WORDPRESS_USERNAME=${WORDPRESS_USERNAME}
      - WORDPRESS_APP_PASSWORD=${WORDPRESS_APP_PASSWORD}
      - POSTIZ_URL=${POSTIZ_URL}
      - POSTIZ_API_KEY=${POSTIZ_API_KEY}
      - IMMICH_URL=${IMMICH_URL}
      - IMMICH_API_KEY=${IMMICH_API_KEY}
    volumes:
      - ./data:/app/data

  mariadb:
    image: mariadb:10.11
    container_name: copromote-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-copromote_db}
      MYSQL_USER: ${DB_USER:-copromote}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
