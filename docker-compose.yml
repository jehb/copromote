services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promoty-app
    restart: always
    ports:
      - "80:3000"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://${DB_USER:-promoty}:${DB_PASSWORD:-password}@mariadb:3306/${DB_NAME:-promoty_db}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - DISABLE_SECURE_COOKIES=${DISABLE_SECURE_COOKIES}
    volumes:
      - ./data:/app/data

  mariadb:
    image: mariadb:10.11
    container_name: promoty-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-promoty_db}
      MYSQL_USER: ${DB_USER:-promoty}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
